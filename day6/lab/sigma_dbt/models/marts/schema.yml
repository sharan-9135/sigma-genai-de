```sql
-- models/marts/mart_transaction_metrics.sql

WITH completed_transactions AS (
    SELECT
        transaction_id,
        amount,
        status,
        merchant_id,
        customer_id,
        transaction_date,
        payment_method
    FROM {{ ref('fact_transactions') }}
    WHERE status = 'COMPLETED'
),

merchant_details AS (
    SELECT
        merchant_id,
        merchant_name,
        category,
        city,
        onboarded_date
    FROM {{ ref('dim_merchant') }}
),

customer_details AS (
    SELECT
        customer_id,
        customer_name,
        email,
        tier,
        signup_date,
        city
    FROM {{ ref('dim_customer') }}
),

revenue_calc AS (
    SELECT
        SUM(amount) AS total_revenue
    FROM completed_transactions
),

failure_rate_calc AS (
    SELECT
        COUNT(CASE WHEN status = 'FAILED' THEN 1 END) * 100.0 / COUNT(*) AS failure_rate_pct
    FROM {{ ref('fact_transactions') }}
),

invalid_status_check AS (
    SELECT
        COUNT(*) AS invalid_status_count
    FROM {{ ref('fact_transactions') }}
    WHERE status = 'CANCELLED'
)

SELECT
    ct.transaction_id,
    ct.amount,
    ct.status,
    ct.merchant_id,
    md.merchant_name,
    ct.customer_id,
    cd.customer_name,
    ct.transaction_date,
    ct.payment_method,
    rc.total_revenue,
    frc.failure_rate_pct,
    isc.invalid_status_count
FROM completed_transactions ct
JOIN merchant_details md ON ct.merchant_id = md.merchant_id
JOIN customer_details cd ON ct.customer_id = cd.customer_id
CROSS JOIN revenue_calc rc
CROSS JOIN failure_rate_calc frc
CROSS JOIN invalid_status_check isc
