version: 2

mart_transactions:
  description: "Mart containing aggregated transaction data with merchant names."
  columns:
    - name: transaction_id
      description: "Unique identifier for each transaction."
    - name: amount
      description: "Transaction amount in USD."
    - name: status
      description: "Status of the transaction: COMPLETED, FAILED, PENDING."
    - name: merchant_id
      description: "Foreign key referencing dim_merchant."
      tests:
        - not_null
    - name: customer_id
      description: "Foreign key referencing dim_customer."
    - name: transaction_date
      description: "Date of the transaction."
    - name: payment_method
      description: "Payment method used: CREDIT_CARD, DEBIT_CARD, UPI."
    - name: merchant_name
      description: "Name of the merchant from dim_merchant."
    - name: total_revenue
      description: "Total revenue from completed transactions."
      tests:
        - generic_test:
            function: "test_total_revenue_gte_zero"
    - name: failure_rate_pct
      description: "Failure rate of transactions as a percentage."
      tests:
        - generic_test:
            function: "test_failure_rate_between_zero_and_one_hundred"
    - name: invalid_status_check
      description: "Check for invalid status values like 'CANCELLED'."
      tests:
        - generic_test:
            function: "test_status_not_cancelled"

  tests:
    - generic_test:
        function: "test_total_revenue_gte_zero"
    - generic_test:
        function: "test_failure_rate_between_zero_and_one_hundred"
    - generic_test:
        function: "test_status_not_cancelled"
